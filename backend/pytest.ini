[pytest]
testpaths = app/tests
python_files = test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: marks tests that hit real ML models (deselect with -m 'not slow')
    real_kokoro: tests that require Kokoro to be importable
